services:
  web:
    image: node:22-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public:ro
      - ./server.js:/app/server.js:ro
      - ./data:/app/data
    working_dir: /app
    command: node server.js
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 3s
